<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Login</title>
</head>

<body>
    <header id="page_header">
        <div>
            <div><img src="img/logo.jpeg" alt="Sweet Scoop Ice Cream Logo"></div>
        </div>

        <div>
            <h3>Sweet Scoop Ice Cream</h3>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <main class="login_main">
        <div id="login_container">
            <h1>Signup</h1>
            <form id="login_form">
                <label for="signup_username">Username</label><br>
                <input type="text" id="signup_username" name="signup_username" required><br><br>

                <label for="email">Email</label><br>
                <input type="text" id="email" name="email" required><br><br>

                <label for="signup_password">Password</label><br>
                <input type="password" id="signup_password" name="signup_password" required><br><br>

                <label for="signup_confirm_password">Confirm Password</label><br>
                <input type="password" id="signup_confirm_password" name="signup_confirm_password" required><br><br>

                <button type="submit" class="signup_button">Signup</button>
            </form>

            <div id="message"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Sweet Scoop Ice Cream.</p>
    </footer>

    <script src="signup.js"></script>
</body>

</html>
